<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneDrive Excel Bağlantı Testi</title>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f3f2f1; min-height: 100vh; }
  .topbar { background: #0078d4; color: white; padding: 14px 24px; display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: bold; }
  .topbar span { font-weight: normal; font-size: 13px; opacity: .8; }
  .main { max-width: 800px; margin: 32px auto; padding: 0 16px; display: flex; flex-direction: column; gap: 16px; }
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 4px; overflow: hidden; }
  .card-head { background: #f9f9f9; border-bottom: 1px solid #e0e0e0; padding: 12px 18px; font-weight: bold; font-size: 14px; color: #333; display: flex; align-items: center; justify-content: space-between; }
  .card-body { padding: 18px; }
  label { display: block; font-size: 12px; color: #555; margin-bottom: 5px; font-weight: bold; }
  input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; outline: none; }
  input:focus { border-color: #0078d4; box-shadow: 0 0 0 2px rgba(0,120,212,.15); }
  .btn { padding: 8px 18px; border: none; border-radius: 3px; font-size: 13px; cursor: pointer; font-weight: bold; }
  .btn-primary { background: #0078d4; color: white; }
  .btn-primary:hover { background: #106ebe; }
  .btn-success { background: #107c10; color: white; }
  .btn-success:hover { background: #0b6a0b; }
  .btn-gray { background: #605e5c; color: white; }
  .btn-gray:hover { background: #484644; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .field { margin-bottom: 12px; }
  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .row > .field { flex: 1; min-width: 140px; margin-bottom: 0; }
  .alert { padding: 10px 14px; border-radius: 3px; font-size: 13px; margin-top: 10px; border-left: 4px solid; }
  .alert-ok   { background: #dff6dd; color: #0f5132; border-color: #107c10; }
  .alert-err  { background: #fde7e9; color: #8e0f14; border-color: #d13438; }
  .alert-info { background: #deecf9; color: #004578; border-color: #0078d4; }
  .alert-warn { background: #fff4ce; color: #6d4800; border-color: #c7a10a; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #0078d4; color: white; padding: 9px 12px; text-align: left; font-size: 12px; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:hover { background: #f3f9ff; }
  tbody td { padding: 8px 12px; }
  .empty-msg { text-align: center; padding: 32px; color: #aaa; font-size: 13px; }
  .log { background: #1b1b1b; color: #d4d4d4; font-family: 'Courier New', monospace; font-size: 11px; padding: 12px; height: 150px; overflow-y: auto; border-radius: 3px; white-space: pre-wrap; word-break: break-all; }
  .conn-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: bold; }
  .conn-badge.yes { background: #dff6dd; color: #107c10; }
  .conn-badge.no  { background: #fde7e9; color: #d13438; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.5; }
</style>
</head>
<body>

<div class="topbar">
  📊 OneDrive Excel Bağlantı Testi
  <span>— BEY MRP İlk Adım</span>
  <div style="margin-left:auto;" id="top-badge">
    <span class="conn-badge no">Bağlı Değil</span>
  </div>
</div>

<div class="main">

  <div class="card">
    <div class="card-head">🔑 Bağlantı Ayarları</div>
    <div class="card-body">
      <div class="field">
        <label>Azure App Client ID</label>
        <input id="client-id" value="66dea19f-5eb2-4f4d-b4dc-b3e87acbceca" />
      </div>
      <div class="field">
        <label>OneDrive'daki Excel Dosyasının Yolu</label>
        <input id="file-path" value="/BEYMRP/bey-mrp-test.xlsx" />
        <div class="hint">Örnek: <b>/BEYMRP/bey-mrp-test.xlsx</b></div>
      </div>
      <div class="field">
        <label>Sheet / Sekme Adı</label>
        <input id="sheet-name" value="Sayfa1" style="width:200px;" />
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="btn-login" onclick="msalGiris()">🔐 Microsoft ile Giriş Yap</button>
        <button class="btn btn-gray" id="btn-logout" onclick="cikisYap()" style="display:none;">Çıkış Yap</button>
      </div>
      <div id="login-status"></div>
    </div>
  </div>

  <div class="card" id="tablo-card" style="display:none;">
    <div class="card-head">
      📋 Excel Tablosu
      <button class="btn btn-primary" style="font-size:12px;padding:5px 12px;" onclick="veriOku()">↻ Yenile</button>
    </div>
    <div id="tablo-ici"><div class="empty-msg">Yükleniyor...</div></div>
  </div>

  <div class="card" id="ekle-card" style="display:none;">
    <div class="card-head">➕ Yeni Satır Ekle</div>
    <div class="card-body">
      <div class="row">
        <div class="field"><label>Sütun A</label><input id="yeni-a" placeholder="Değer girin..." /></div>
        <div class="field"><label>Sütun B</label><input id="yeni-b" placeholder="Değer girin..." /></div>
        <div><button class="btn btn-success" id="btn-ekle" onclick="satirEkle()" style="margin-top:17px;">✓ Ekle</button></div>
      </div>
      <div id="ekle-status"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-head">🖥 İşlem Logu</div>
    <div class="card-body" style="padding:12px;"><div class="log" id="log"></div></div>
  </div>

</div>

<script>
const CLIENT_ID = '66dea19f-5eb2-4f4d-b4dc-b3e87acbceca';
const REDIRECT_URI = 'https://beybrk.github.io/beymrp/onedrive-excel-baglanti.html';
const SCOPES = ['Files.ReadWrite', 'User.Read'];
const GRAPH = 'https://graph.microsoft.com/v1.0';

let msalApp = null;
let account = null;
let accessToken = null;
let satirSayisi = 0;

async function initMsal() {
  const clientId = document.getElementById('client-id').value.trim() || CLIENT_ID;
  msalApp = new msal.PublicClientApplication({
    auth: {
      clientId,
      authority: 'https://login.microsoftonline.com/common',
      redirectUri: REDIRECT_URI,
      navigateToLoginRequestUrl: false,
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false },
  });
  await msalApp.initialize();
  return msalApp;
}

async function handleRedirect() {
  try {
    await initMsal();
    const result = await msalApp.handleRedirectPromise();
    if (result && result.account) {
      account = result.account;
      accessToken = result.accessToken;
      log('✓ Giriş başarılı: ' + account.username);
      girisBasarili();
      return;
    }
    // Mevcut hesap var mı kontrol et
    const accounts = msalApp.getAllAccounts();
    if (accounts.length > 0) {
      account = accounts[0];
      log('✓ Oturum mevcut: ' + account.username);
      await tokenYenile();
      girisBasarili();
    } else {
      log('Hazır. "Microsoft ile Giriş Yap" butonuna basın.');
    }
  } catch(e) {
    log('Başlangıç hatası: ' + e.message);
  }
}

async function msalGiris() {
  try {
    log('Giriş başlatılıyor...');
    if (!msalApp) await initMsal();
    await msalApp.loginRedirect({ scopes: SCOPES });
  } catch(e) {
    log('Giriş hatası: ' + e.message);
    showAlert('login-status', '✕ ' + e.message, 'err');
  }
}

async function tokenYenile() {
  if (!msalApp || !account) return;
  try {
    const r = await msalApp.acquireTokenSilent({ scopes: SCOPES, account });
    accessToken = r.accessToken;
  } catch(e) {
    await msalApp.loginRedirect({ scopes: SCOPES });
  }
}

function girisBasarili() {
  document.getElementById('btn-login').style.display  = 'none';
  document.getElementById('btn-logout').style.display = '';
  document.getElementById('tablo-card').style.display = '';
  document.getElementById('ekle-card').style.display  = '';
  setBadge(true);
  showAlert('login-status', '✓ Giriş yapıldı: ' + account.username, 'ok');
  veriOku();
}

async function cikisYap() {
  try { await msalApp.logoutRedirect({ account }); } catch(e) {}
}

async function msGraph(method, path, body) {
  await tokenYenile();
  const res = await fetch(GRAPH + path, {
    method,
    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || 'HTTP ' + res.status);
  }
  if (res.status === 204) return null;
  return res.json();
}

function dosyaPath() {
  const p = document.getElementById('file-path').value.trim();
  return '/me/drive/root:' + p + ':/workbook';
}
function sheetAdi() {
  return encodeURIComponent(document.getElementById('sheet-name').value.trim() || 'Sayfa1');
}

async function veriOku() {
  log('Excel okunuyor...');
  document.getElementById('tablo-ici').innerHTML = '<div class="empty-msg">⏳ Yükleniyor...</div>';
  try {
    const data = await msGraph('GET', dosyaPath() + '/sheets/' + sheetAdi() + '/usedRange');
    const values = data.values || [];
    satirSayisi = values.length;
    log(values.length + ' satır okundu');
    tabloRender(values);
  } catch(e) {
    log('Okuma hatası: ' + e.message);
    document.getElementById('tablo-ici').innerHTML =
      '<div class="alert alert-err" style="margin:12px;">✕ ' + e.message + '</div>';
  }
}

function tabloRender(values) {
  if (!values.length) {
    document.getElementById('tablo-ici').innerHTML =
      '<div class="empty-msg">Excel boş.</div>';
    return;
  }
  const ba = escHtml(String(values[0]?.[0] || 'Sütun A'));
  const bb = escHtml(String(values[0]?.[1] || 'Sütun B'));
  let html = '<table><thead><tr><th style="width:36px;">#</th><th>' + ba + '</th><th>' + bb + '</th></tr></thead><tbody>';
  for (let i = 1; i < values.length; i++) {
    html += '<tr><td style="color:#aaa;font-size:11px;">' + i + '</td><td>' +
      escHtml(String(values[i][0] ?? '')) + '</td><td>' +
      escHtml(String(values[i][1] ?? '')) + '</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('tablo-ici').innerHTML = html;
}

async function satirEkle() {
  const a = document.getElementById('yeni-a').value.trim();
  const b = document.getElementById('yeni-b').value.trim();
  if (!a && !b) { showAlert('ekle-status', 'En az bir değer girin', 'warn'); return; }
  const btn = document.getElementById('btn-ekle');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Ekleniyor...';
  try {
    const nextRow = satirSayisi + 1;
    const range = 'A' + nextRow + ':B' + nextRow;
    await msGraph('PATCH', dosyaPath() + '/sheets/' + sheetAdi() + '/range(address=\'' + range + '\')', {
      values: [[a, b]]
    });
    log('✓ Eklendi → Satır ' + nextRow);
    showAlert('ekle-status', '✓ Eklendi! (Satır ' + nextRow + ')', 'ok');
    document.getElementById('yeni-a').value = '';
    document.getElementById('yeni-b').value = '';
    document.getElementById('yeni-a').focus();
    await veriOku();
  } catch(e) {
    log('Ekleme hatası: ' + e.message);
    showAlert('ekle-status', '✕ ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✓ Ekle';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' &&
    (document.activeElement.id === 'yeni-a' || document.activeElement.id === 'yeni-b')) {
    satirEkle();
  }
});

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '<div class="alert alert-' + type + '">' + msg + '</div>';
  if (type === 'ok') setTimeout(() => el.innerHTML = '', 5000);
}

function log(msg) {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('tr-TR');
  el.textContent += '[' + t + '] ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function setBadge(on) {
  document.getElementById('top-badge').innerHTML =
    '<span class="conn-badge ' + (on?'yes':'no') + '">' + (on ? '✓ Bağlı' : 'Bağlı Değil') + '</span>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Sayfa yüklenince redirect'i işle
handleRedirect();
</script>
</body>
</html>
