<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Giriş...</title></head>
<body>
<script>
(function() {
  var fullUrl = window.location.href;
  var hash = window.location.hash;
  var search = window.location.search;
  
  var stateParam = '';
  try {
    var p1 = new URLSearchParams(hash.startsWith('#') ? hash.substring(1) : '');
    var p2 = new URLSearchParams(search.startsWith('?') ? search.substring(1) : '');
    stateParam = p1.get('state') || p2.get('state') || '';
  } catch(e) {}
  
  var libraryStateId = '';
  if (stateParam) {
    try {
      var parts = stateParam.split('|');
      var b64 = parts[0].replace(/-/g, '+').replace(/_/g, '/');
      var pad = b64.length % 4 === 0 ? '' : '===='.slice(b64.length % 4);
      var decoded = atob(b64 + pad);
      var obj = JSON.parse(decoded);
      libraryStateId = obj.id || '';
    } catch(e) {}
  }

  function tryClose() { setTimeout(function(){ window.close(); }, 300); }

  if (libraryStateId) {
    try {
      var bc = new BroadcastChannel(libraryStateId);
      bc.postMessage({ payload: fullUrl });
      bc.close();
      tryClose();
      return;
    } catch(e) {}
  }

  if (window.opener) {
    try {
      window.opener.postMessage({ type: 'msalRedirect', url: fullUrl }, '*');
      tryClose();
      return;
    } catch(e) {}
  }

  tryClose();
})();
</script>
<p style="font-family:Arial;text-align:center;margin-top:80px;color:#555;font-size:15px;">
  ✓ Giriş tamamlandı, pencere kapanıyor...
</p>
</body>
</html>
