<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Giriş...</title></head>
<body>
<script>
// MSAL redirect bridge - popup bu sayfada kapanır, token ana pencereye iletilir
if (window.opener) {
  const bc = new BroadcastChannel(new URLSearchParams(window.location.hash.substring(1)).get('state') || 
                                   new URLSearchParams(window.location.search).get('state') || '');
  bc.postMessage({ payload: window.location.href });
  bc.close();
  window.close();
}
</script>
<p style="font-family:Arial;text-align:center;margin-top:50px;color:#666;">Giriş tamamlanıyor, lütfen bekleyin...</p>
</body>
</html>
